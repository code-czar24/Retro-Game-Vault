<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Game Vault</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container header-top">
            <h1>Retro Game Vault</h1>
            <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
        </div>
        <div class="container">
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search games...">
                </div>
                <div class="filter-sort-box">
                    <select id="genreSelect">
                        <option value="all">All Genres</option>
                        <option value="Action">Action</option>
                        <option value="Adventure">Adventure</option>
                        <option value="Role-Playing">RPG</option>
                        <option value="Shooter">Shooter</option>
                        <option value="Puzzle">Puzzle</option>
                    </select>
                    <select id="sortSelect">
                        <option value="none">Sort By</option>
                        <option value="rating-desc">Rating: High to Low</option>
                        <option value="rating-asc">Rating: Low to High</option>
                        <option value="name-asc">Alphabetical (A-Z)</option>
                        <option value="name-desc">Alphabetical (Z-A)</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="status-message">
            <div class="spinner"></div>
            Loading games...
        </div>
        <div id="error" class="status-message hidden">Something went wrong. Please try again later.</div>
        <div id="gameGrid" class="game-grid"></div>
    </main>

    <footer>
        <div class="container footer-content">
            <p>&copy; <span id="year"></span> Retro Game Vault.</p>
            <div class="signature">
                <p>Crafted by <span class="name-glow">Vinayak Giregol</span> <span class="heart">❤️</span></p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
